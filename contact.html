<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | fogdonut</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #000000;
      color: #ffffff;
      font-family: 'Ubuntu', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
    }

    a {
      color: #ffffff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      background: #000000;
      padding: 48px 24px 40px;
    }

    .logo-link {
      display: block;
      width: fit-content;
      margin: 0 auto;
    }

    .logo {
      display: block;
      width: 72px;
      height: auto;
    }

    .content {
      width: 100%;
      max-width: 1280px;
      margin: 96px auto 0;
    }

    .date {
      margin: 0 0 12px;
      font-size: 12px;
      line-height: 1.8;
      font-weight: 400;
    }

    .breadcrumb {
      margin: 0 0 36px;
      font-size: 12px;
      line-height: 1.8;
      font-weight: 400;
    }

    .contact-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: flex-start;
    }

    .contact-text {
      margin: 0;
      font-size: 14px;
      line-height: 1.8;
      font-weight: 500;
    }

    .copyright {
      text-align: center;
      font-size: 12px;
      margin: 120px 0 0;
      color: #ffffff;
      font-weight: 400;
    }

    @media screen and (max-width: 768px) {
      .page {
        padding: 32px 24px;
      }

      .logo {
        width: 56px;
      }

      .content {
        margin-top: 72px;
      }

      .date,
      .breadcrumb {
        font-size: 10px;
      }

      .breadcrumb {
        margin-bottom: 30px;
      }

      .contact-list {
        gap: 12px;
      }

      .contact-text {
        font-size: 12px;
      }

      .copyright {
        font-size: 10px;
        margin-top: 96px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <a href="index.html" class="logo-link" aria-label="Home">
      <img
  class="logo"
  src="images/fogdonutVI_white_transparent_600.png"
  alt="fogdonut"
>
    </a>

    <section class="content">
      <p class="date" id="currentDate"></p>

      <p class="breadcrumb">
        <a href="index.html">Home</a>
        <span>&gt;</span>
        <span>Contact</span>
        <span>&gt;</span>
      </p>

<div class="contact-list">
  <p class="contact-text">
    <a href="mailto:fogdonut.info@gmail.com">fogdonut.info@gmail.com</a>
  </p>

  <p class="contact-text">
    <a href="https://x.com/fogdonut" target="_blank" rel="noopener noreferrer">@fogdonut</a>
  </p>
</div>
    </section>

    <p class="copyright" id="copyright"></p>
  </main>

  <script>
    const date = new Date();

    const monthNames = [
      "Jan", "Feb", "Mar", "Apr", "May", "Jun",
      "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"
    ];

    const month = monthNames[date.getMonth()];
    const day = date.getDate();
    const year = date.getFullYear();

    document.getElementById("currentDate").innerHTML =
      month + " " + day + ", " + year;

    document.getElementById("copyright").innerHTML =
      "© " + year + " fogdonut";
  </script>
</body>
</html>
