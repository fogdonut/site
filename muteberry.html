<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>muteberry | fogdonut</title>

  <link rel="icon" type="image/png" href="images/fogdonutVI_favicon.png">
  <link rel="apple-touch-icon" href="images/fogdonutVI_apple_touch.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #000000;
      color: #ffffff;
      font-family: 'Ubuntu', sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
    }

    * {
      box-sizing: border-box;
    }

    a {
      color: #ffffff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    button {
      font-family: 'Ubuntu', sans-serif;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      background: #000000;
      padding-bottom: 44px;
    }

    .page-header {
      width: 100%;
      max-width: 1500px;
      margin: 0 auto 40px;
      padding: 48px 0 0;
    }

    .logo-link {
      display: block;
      width: fit-content;
      margin: 0 auto 48px;
    }

    .logo {
      display: block;
      width: 72px;
      height: auto;
    }

    .align-block {
      width: calc(100% - 48px);
      max-width: 1280px;
      margin-left: auto;
      margin-right: auto;
    }

    .meta {
      font-size: 12px;
      line-height: 1.8;
      font-weight: 400;
    }

    .date,
    .breadcrumb {
      margin: 0;
    }

    .slider {
      width: 100%;
      max-width: 1500px;
      margin: 0 auto;
      padding: 0 24px 20px;
    }

    .main-row {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) 56px;
      align-items: center;
      gap: 18px;
    }

    .main-image {
      width: 100%;
      max-width: 1280px;
      height: auto;
      display: block;
      margin: 0 auto;
      cursor: zoom-in;
    }

    .arrow {
      width: 56px;
      height: 56px;
      background: transparent;
      color: #ffffff;
      border: none;
      font-size: 56px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      opacity: 0.85;
    }

    .arrow:hover,
    .arrow:focus-visible {
      opacity: 1;
      outline: none;
    }

    .thumbnail-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 0 24px 8px;
    }

    .thumbnail-row::-webkit-scrollbar {
      height: 4px;
    }

    .thumbnail-row::-webkit-scrollbar-track {
      background: transparent;
    }

    .thumbnail-row::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.35);
    }

    .thumbnail-button {
      width: 72px;
      height: 48px;
      padding: 0;
      border: 2px solid transparent;
      background: transparent;
      cursor: pointer;
      opacity: 0.55;
      flex: 0 0 auto;
    }

    .thumbnail-button.active {
      border-color: #ffffff;
      opacity: 1;
    }

    .thumbnail-button:focus-visible {
      outline: 2px solid #ffffff;
      outline-offset: 3px;
      opacity: 1;
    }

    .thumbnail {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .purchase-section {
      margin-top: 22px;
    }

    .purchase-label {
      margin: 0 0 14px;
      font-size: 12px;
      line-height: 1.8;
      font-weight: 400;
      color: #ffffff;
    }

    .purchase-link {
      display: inline-block;
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.02em;
      color: #ffffff;
      text-decoration: none;
    }

    .purchase-link:hover,
    .purchase-link:focus-visible {
      text-decoration: underline;
    }

    .copyright {
      text-align: center;
      font-size: 12px;
      margin: 56px 0 0;
      padding-bottom: 44px;
      color: #ffffff;
      font-weight: 400;
    }

    .fullscreen-viewer {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.98);
    }

    .fullscreen-viewer.active {
      display: flex;
    }

    .fullscreen-image {
      max-width: 94vw;
      max-height: 94vh;
      object-fit: contain;
      display: block;
    }

    .fullscreen-close {
      position: fixed;
      top: 24px;
      right: 32px;
      z-index: 1000000;
      background: transparent;
      color: #ffffff;
      border: none;
      font-size: 48px;
      line-height: 1;
      cursor: pointer;
    }

    .fullscreen-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1000000;
      background: transparent;
      color: #ffffff;
      border: none;
      font-size: 72px;
      line-height: 1;
      cursor: pointer;
      opacity: 0.85;
    }

    .fullscreen-arrow:hover,
    .fullscreen-arrow:focus-visible,
    .fullscreen-close:hover,
    .fullscreen-close:focus-visible {
      opacity: 1;
      outline: none;
    }

    .fullscreen-prev {
      left: 36px;
    }

    .fullscreen-next {
      right: 36px;
    }

    @media screen and (max-height: 820px) and (min-width: 769px) {
      .page-header {
        margin-bottom: 28px;
        padding-top: 36px;
      }

      .logo-link {
        margin-bottom: 36px;
      }

      .logo {
        width: 64px;
      }

      .thumbnail-row {
        margin-top: 16px;
      }

      .purchase-section {
        margin-top: 18px;
      }

      .copyright {
        margin-top: 40px;
        padding-bottom: 32px;
      }
    }

    @media screen and (max-width: 768px) {
      .page {
        padding-bottom: 32px;
      }

      .page-header {
        padding-top: 32px;
        margin-bottom: 36px;
      }

      .logo {
        width: 56px;
      }

      .logo-link {
        margin-bottom: 36px;
      }

      .align-block {
        width: calc(100% - 48px);
      }

      .meta {
        font-size: 10px;
      }

      .slider {
        padding: 0 24px 20px;
      }

      .main-row {
        grid-template-columns: 36px minmax(0, 1fr) 36px;
        gap: 8px;
      }

      .arrow {
        width: 36px;
        height: 36px;
        font-size: 40px;
      }

      .thumbnail-row {
        justify-content: flex-start;
        gap: 6px;
        margin-top: 18px;
        padding: 0 16px 8px;
      }

      .thumbnail-button {
        width: 72px;
        height: 48px;
      }

      .purchase-section {
        margin-top: 28px;
      }

      .purchase-label {
        font-size: 10px;
        margin-bottom: 14px;
      }

      .purchase-link {
        font-size: 16px;
      }

      .copyright {
        font-size: 10px;
        margin-top: 56px;
        padding-bottom: 36px;
      }

      .fullscreen-close {
        top: 16px;
        right: 20px;
        font-size: 40px;
      }

      .fullscreen-arrow {
        font-size: 48px;
      }

      .fullscreen-prev {
        left: 16px;
      }

      .fullscreen-next {
        right: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="page-header">
      <a href="index.html" class="logo-link" aria-label="Home">
        <img
          class="logo"
          src="images/fogdonutVI_white_transparent_600.png"
          alt="fogdonut"
        >
      </a>

      <div class="meta align-block">
        <p class="date" id="currentDate"></p>
        <p class="breadcrumb">
          <a href="index.html">Home</a>
          <span>&gt;</span>
          <a href="avatar.html">Avatar</a>
          <span>&gt;</span>
          <span>muteberry</span>
        </p>
      </div>
    </header>

    <section class="slider" aria-label="muteberry image gallery">
      <div class="main-row">
        <button class="arrow" id="prevBtn" type="button" aria-label="Previous image">‹</button>

        <img
          id="mainImage"
          class="main-image"
          src="images/muteberry_01.jpg"
          alt="muteberry image 1"
        >

        <button class="arrow" id="nextBtn" type="button" aria-label="Next image">›</button>
      </div>

      <div class="thumbnail-row" id="thumbnailRow" aria-label="Image thumbnails"></div>
    </section>

    <section class="purchase-section align-block" aria-label="Purchase">
      <p class="purchase-label">Available on BOOTH</p>
      <a
        class="purchase-link"
        href="https://r3isen.booth.pm/items/5979296"
        target="_blank"
        rel="noopener noreferrer"
      >
        Purchase
      </a>
    </section>

    <p class="copyright" id="copyright"></p>
  </main>

  <div
    class="fullscreen-viewer"
    id="fullscreenViewer"
    role="dialog"
    aria-modal="true"
    aria-label="Image fullscreen viewer"
  >
    <button class="fullscreen-close" id="closeFullscreen" type="button" aria-label="Close fullscreen viewer">×</button>
    <button class="fullscreen-arrow fullscreen-prev" id="fullscreenPrev" type="button" aria-label="Previous image">‹</button>

    <img id="fullscreenImage" class="fullscreen-image" src="" alt="">

    <button class="fullscreen-arrow fullscreen-next" id="fullscreenNext" type="button" aria-label="Next image">›</button>
  </div>

  <script>
    const images = [
  "images/muteberry_01.jpg",
  "images/muteberry_02.jpg",
  "images/muteberry_03.jpg",
  "images/muteberry_04.jpg",
  "images/muteberry_05.jpg",
  "images/muteberry_06.jpg",
  "images/muteberry_07.jpg",
  "images/muteberry_08.jpg",
  "images/muteberry_09.jpg",
  "images/muteberry_10.jpg",
  "images/muteberry_11.jpg",
  "images/muteberry_12.jpg"
];

    let currentIndex = 0;

    const mainImage = document.getElementById("mainImage");
    const thumbnailRow = document.getElementById("thumbnailRow");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");

    const fullscreenViewer = document.getElementById("fullscreenViewer");
    const fullscreenImage = document.getElementById("fullscreenImage");
    const closeFullscreen = document.getElementById("closeFullscreen");
    const fullscreenPrev = document.getElementById("fullscreenPrev");
    const fullscreenNext = document.getElementById("fullscreenNext");

    const currentDate = document.getElementById("currentDate");
    const copyright = document.getElementById("copyright");

    const monthNames = [
      "Jan", "Feb", "Mar", "Apr", "May", "Jun",
      "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"
    ];

    function setMetaText() {
      const date = new Date();
      const month = monthNames[date.getMonth()];
      const day = date.getDate();
      const year = date.getFullYear();

      currentDate.textContent = `${month} ${day}, ${year}`;
      copyright.textContent = `© ${year} fogdonut`;
    }

    function getThumbnailButtons() {
      return thumbnailRow.querySelectorAll(".thumbnail-button");
    }

    function updateImages() {
      const src = images[currentIndex];
      const altText = `muteberry image ${currentIndex + 1}`;

      mainImage.src = src;
      mainImage.alt = altText;

      fullscreenImage.src = src;
      fullscreenImage.alt = altText;
    }

    function updateThumbnails() {
      const thumbnails = getThumbnailButtons();

      thumbnails.forEach(function(thumbnail, index) {
        const isActive = index === currentIndex;

        thumbnail.classList.toggle("active", isActive);
        thumbnail.setAttribute("aria-current", isActive ? "true" : "false");
      });

      const activeThumbnail = thumbnails[currentIndex];

      if (activeThumbnail) {
        activeThumbnail.scrollIntoView({
          behavior: "smooth",
          inline: "center",
          block: "nearest"
        });
      }
    }

    function showSlide(index) {
      currentIndex = (index + images.length) % images.length;

      updateImages();
      updateThumbnails();
    }

    function nextSlide() {
      showSlide(currentIndex + 1);
    }

    function prevSlide() {
      showSlide(currentIndex - 1);
    }

    function openFullscreen() {
      updateImages();
      fullscreenViewer.classList.add("active");
      document.body.style.overflow = "hidden";
      closeFullscreen.focus();
    }

    function closeFullscreenView() {
      fullscreenViewer.classList.remove("active");
      document.body.style.overflow = "";
      mainImage.focus?.();
    }

    function isFullscreenOpen() {
      return fullscreenViewer.classList.contains("active");
    }

    function createThumbnails() {
      images.forEach(function(src, index) {
        const button = document.createElement("button");
        button.className = "thumbnail-button";
        button.type = "button";
        button.setAttribute("aria-label", `Show image ${index + 1}`);

        if (index === currentIndex) {
          button.classList.add("active");
          button.setAttribute("aria-current", "true");
        } else {
          button.setAttribute("aria-current", "false");
        }

        const image = document.createElement("img");
        image.className = "thumbnail";
        image.src = src;
        image.alt = "";

        button.appendChild(image);

        button.addEventListener("click", function() {
          showSlide(index);
        });

        thumbnailRow.appendChild(button);
      });
    }

    prevBtn.addEventListener("click", prevSlide);
    nextBtn.addEventListener("click", nextSlide);

    fullscreenPrev.addEventListener("click", prevSlide);
    fullscreenNext.addEventListener("click", nextSlide);

    mainImage.addEventListener("click", openFullscreen);
    closeFullscreen.addEventListener("click", closeFullscreenView);

    fullscreenViewer.addEventListener("click", function(event) {
      if (event.target === fullscreenViewer) {
        closeFullscreenView();
      }
    });

    document.addEventListener("keydown", function(event) {
      if (event.key === "ArrowRight") {
        nextSlide();
        return;
      }

      if (event.key === "ArrowLeft") {
        prevSlide();
        return;
      }

      if (isFullscreenOpen() && event.key === "Escape") {
        closeFullscreenView();
      }
    });

    setMetaText();
    createThumbnails();
    showSlide(0);
  </script>
</body>
</html>
