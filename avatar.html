<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar | fogdonut</title>
  
  <link rel="icon" type="image/png" href="images/fogdonutVI_favicon.png">
  <link rel="apple-touch-icon" href="images/fogdonutVI_apple_touch.png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #000000;
      color: #ffffff;
      font-family: 'Ubuntu', sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
    }

    a {
      color: #ffffff;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      background: #000000;
      padding: 48px 24px 40px;
    }

    .logo-link {
      display: block;
      width: fit-content;
      margin: 0 auto;
    }

    .logo {
      display: block;
      width: 72px;
      height: auto;
    }

    .content {
      width: 100%;
      max-width: 1280px;
      margin: 96px auto 0;
    }

    .date {
      margin: 0 0 12px;
      font-size: 12px;
      line-height: 1.8;
      font-weight: 400;
    }

    .breadcrumb {
      margin: 0 0 52px;
      font-size: 12px;
      line-height: 1.8;
      font-weight: 400;
    }

    .avatar-list {
      display: flex;
      flex-direction: column;
      gap: 42px;
      align-items: flex-start;
    }

    .avatar-link {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1;
      color: #ffffff;
      text-decoration: none;
    }

    .avatar-link:hover {
      text-decoration: underline;
    }

    .copyright {
      text-align: center;
      font-size: 12px;
      margin: 120px 0 0;
      color: #ffffff;
      font-weight: 400;
    }

    @media screen and (max-width: 768px) {
      .page {
        padding: 32px 24px;
      }

      .logo {
        width: 56px;
      }

      .content {
        margin-top: 72px;
      }

      .date,
      .breadcrumb {
        font-size: 10px;
      }

      .breadcrumb {
        margin-bottom: 42px;
      }

      .avatar-list {
        gap: 34px;
      }

      .avatar-link {
        font-size: 16px;
      }

      .copyright {
        font-size: 10px;
        margin-top: 96px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <a href="index.html" class="logo-link" aria-label="Home">
      <img
  class="logo"
  src="images/fogdonutVI_white_transparent_600.png"
  alt="fogdonut"
>
    </a>

    <section class="content">
      <p class="date" id="currentDate"></p>

      <p class="breadcrumb">
        <a href="index.html">Home</a>
        <span>&gt;</span>
        <span>Avatar</span>
        <span>&gt;</span>
      </p>

      <nav class="avatar-list" aria-label="Avatar list">
        <a class="avatar-link" href="muteberry.html">muteberry</a>
        <a class="avatar-link" href="https://r3isen.booth.pm/items/4927449" target="_blank" rel="noopener noreferrer">ré3</a>
        <a class="avatar-link" href="https://r3isen.booth.pm/items/3940636" target="_blank" rel="noopener noreferrer">ré1</a>
      </nav>
    </section>

    <p class="copyright" id="copyright"></p>
  </main>

  <script>
    const date = new Date();

    const monthNames = [
      "Jan", "Feb", "Mar", "Apr", "May", "Jun",
      "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"
    ];

    const month = monthNames[date.getMonth()];
    const day = date.getDate();
    const year = date.getFullYear();

    document.getElementById("currentDate").textContent =
      month + " " + day + ", " + year;

    document.getElementById("copyright").textContent =
      "© " + year + " fogdonut";
  </script>
</body>
</html>
